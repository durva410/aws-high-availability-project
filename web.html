<!DOCTYPE html>
<html>
<head>
    <title>My First EC2 Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            padding-top: 100px;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            font-size: 20px;
            color: #555;
        }
        .box {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ff9900;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e68a00;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>🚀 Website Successfully Hosted!</h1>
        <p>This website is running on my AWS EC2 instance.</p>
        <button onclick="showMessage()">Click Me</button>
        <p id="message"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML =
                "🎉 The application is successfully deployed on EC2 and integrated with a Load Balancer!";
        }
    </script>

</body>
</html>
